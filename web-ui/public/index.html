<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Unwrap</title>
    <style>
        :root {
            --bg: #f4f5f7;
            --card: #ffffff;
            --text: #1f2430;
            --muted: #6b7280;
            --border: #e3e6eb;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --success: #16a34a;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 48px 20px 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .logo svg { width: 20px; height: 20px; }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--muted);
            margin: 0 0 28px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.04);
        }

        label.field-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #fff;
            color: var(--text);
            font-size: 15px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .btn:hover { background-color: var(--accent-hover); }

        .btn-block { width: 100%; margin-top: 16px; }

        .btn-ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 7px 12px;
            font-size: 13px;
            font-weight: 600;
        }
        .btn-ghost:hover { background: #f3f4f6; }

        .help-link {
            display: inline-block;
            margin-top: 12px;
            font-size: 13px;
            color: var(--accent);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
        }
        .help-link:hover { text-decoration: underline; }

        .help-box {
            display: none;
            margin-top: 12px;
            background: #f8f9fb;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }
        .help-box p { margin: 0 0 8px; font-size: 13px; color: var(--muted); }
        .help-box pre {
            margin: 0;
            font-size: 12.5px;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text);
        }

        /* Results */
        #responseContainer { display: none; margin-top: 28px; }

        .results-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .results-head h2 { font-size: 18px; margin: 0; }

        .results-actions { display: flex; align-items: center; gap: 10px; }

        .view-toggle {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .view-toggle button {
            background: #fff;
            border: none;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
        }
        .view-toggle button.active { background: var(--accent); color: #fff; }

        /* Secret table */
        .secret-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .secret-table tr + tr td { border-top: 1px solid var(--border); }
        .secret-table td {
            padding: 14px 16px;
            vertical-align: top;
        }
        .secret-table .field-name {
            width: 35%;
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            word-break: break-word;
        }
        .secret-table .field-value {
            font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
            font-size: 13.5px;
            color: #111827;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .secret-table .field-action {
            width: 1%;
            white-space: nowrap;
            text-align: right;
        }
        .secret-table tr:nth-child(even) td { background: #fafbfc; }

        .field-value.masked {
            color: #9aa1ad;
            letter-spacing: 2px;
            user-select: none;
        }

        .action-group { display: inline-flex; gap: 8px; }

        .cell-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--accent);
            cursor: pointer;
        }
        .cell-btn:hover { background: #f3f4f6; }
        .cell-btn.copied { color: var(--success); border-color: var(--success); }
        .cell-btn.revealed { color: var(--muted); }

        /* JSON view */
        #jsonView {
            display: none;
            background: #0f172a;
            color: #e2e8f0;
            padding: 18px;
            border-radius: 10px;
            font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #111827;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <main class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Vault Unwrap
        </div>
        <h1>Reveal your secret</h1>
        <p class="subtitle">Paste the token you were given to securely unwrap the secret it contains.</p>

        <div class="card">
            <form id="unwrapForm">
                <label class="field-label" for="token">Secret token</label>
                <input type="text" id="token" name="token" placeholder="e.g. hvs.CAESI...." required maxlength="512" autocomplete="off" spellcheck="false">
                <button type="submit" class="btn btn-block">Unwrap secret</button>
            </form>
            <button type="button" class="help-link" id="helpToggle">Prefer the command line? Show curl command</button>
            <div class="help-box" id="helpBox">
                <p>Run this from a terminal instead:</p>
                <pre>curl -X POST \
    -H "X-Vault-Token: your-token-here" \
    https://vault-server-address/v1/sys/wrapping/unwrap</pre>
            </div>
        </div>

        <div id="responseContainer">
            <div class="results-head">
                <h2>Your secret</h2>
                <div class="results-actions" id="resultsActions">
                    <div class="view-toggle">
                        <button type="button" id="tableViewBtn" class="active">Table</button>
                        <button type="button" id="jsonViewBtn">JSON</button>
                    </div>
                    <button type="button" class="btn-ghost" id="revealJsonButton">Reveal secrets</button>
                    <button type="button" class="btn-ghost" id="copyAllButton">Copy all</button>
                </div>
            </div>
            <div id="tableView"></div>
            <pre id="jsonView"></pre>
            <div id="errorView"></div>
        </div>
    </main>

    <div id="toast"></div>

    <script src="/main.js"></script>
</body>
</html>
